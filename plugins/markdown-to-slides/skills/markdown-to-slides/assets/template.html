<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>__DECK_TITLE__</title>
<style>
  :root {
    --bg: #ffffff;
    --bg-2: #f8fafc;
    --bg-3: #f1f5f9;
    --fg: #0f172a;
    --fg-dim: #64748b;
    --fg-mute: #94a3b8;
    --line: #e2e8f0;
    --line-2: #cbd5e1;
    --accent: #0284c7;
    --accent-bg: #e0f2fe;
    --accent-2: #b45309;
    --accent-2-bg: #fef3c7;
    --good: #047857;
    --good-bg: #d1fae5;
    --warn: #b45309;
    --warn-bg: #fef3c7;
    --bad: #b91c1c;
    --bad-bg: #fee2e2;
    --code-bg: #f1f5f9;
    --code-fg: #0c4a6e;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: #e2e8f0;
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .slide {
    width: 1920px;
    height: 1080px;
    background: var(--bg);
    color: var(--fg);
    padding: 80px 100px;
    position: relative;
    overflow: hidden;
    page-break-after: always;
    display: flex;
    flex-direction: column;
  }
  .slide + .slide { margin-top: 40px; }
  .slide::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--accent-2) 100%);
  }
  .num {
    position: absolute;
    top: 40px; right: 60px;
    color: var(--fg-mute);
    font-size: 22px;
    letter-spacing: 2px;
    font-variant-numeric: tabular-nums;
  }
  .tag {
    display: inline-block;
    color: var(--accent);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }
  h1.title {
    font-size: 96px;
    line-height: 1.12;
    margin: 0 0 32px 0;
    letter-spacing: -2px;
    font-weight: 800;
  }
  h1.title .accent { color: var(--accent); }
  h2 {
    font-size: 64px;
    line-height: 1.18;
    margin: 0 0 32px 0;
    letter-spacing: -1.5px;
    font-weight: 800;
  }
  h2 .accent { color: var(--accent); }
  h3 {
    font-size: 34px;
    margin: 24px 0 14px 0;
    color: var(--accent-2);
    font-weight: 700;
  }
  p, li, td, th { font-size: 30px; line-height: 1.55; color: var(--fg); }
  .lead { font-size: 36px; line-height: 1.55; }
  .dim { color: var(--fg-dim); }
  .accent { color: var(--accent); }
  .accent2 { color: var(--accent-2); }
  .good { color: var(--good); }
  .warn { color: var(--warn); }
  .bad { color: var(--bad); }
  ul { margin: 0 0 0 8px; padding: 0 0 0 28px; }
  ul li { margin-bottom: 12px; }
  ol { margin: 0 0 0 8px; padding: 0 0 0 32px; }
  ol li { margin-bottom: 12px; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 26px;
  }
  th, td {
    text-align: left;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  th {
    background: var(--bg-2);
    color: var(--accent);
    font-weight: 700;
    font-size: 24px;
    letter-spacing: 0.5px;
    border-bottom: 2px solid var(--line-2);
  }
  tr:last-child td { border-bottom: none; }
  td code, th code, p code, li code, .card code {
    background: var(--code-bg);
    color: var(--code-fg);
    padding: 2px 8px;
    border-radius: 6px;
    font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    font-size: 0.88em;
    border: 1px solid var(--line);
  }
  .codebox {
    background: var(--code-bg);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px 22px;
    font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
    font-size: 22px;
    line-height: 1.55;
    color: var(--code-fg);
    margin: 12px 0;
  }
  blockquote {
    margin: 0;
    padding: 18px 28px;
    border-left: 5px solid var(--accent);
    background: var(--accent-bg);
    color: var(--fg);
    font-size: 32px;
    line-height: 1.5;
    border-radius: 0 12px 12px 0;
  }
  blockquote.warn { border-left-color: var(--warn); background: var(--warn-bg); }
  blockquote.good { border-left-color: var(--good); background: var(--good-bg); }
  .footer {
    position: absolute;
    bottom: 36px; left: 100px; right: 100px;
    display: flex;
    justify-content: space-between;
    color: var(--fg-mute);
    font-size: 22px;
    border-top: 1px solid var(--line);
    padding-top: 14px;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; align-items: start; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; align-items: start; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 20px; align-items: start; }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 24px 28px;
  }
  .card.accent { border-color: var(--accent); border-left-width: 5px; background: var(--accent-bg); }
  .card.warn { border-color: var(--warn); border-left-width: 5px; background: var(--warn-bg); }
  .card.good { border-color: var(--good); border-left-width: 5px; background: var(--good-bg); }
  .card.bad { border-color: var(--bad); border-left-width: 5px; background: var(--bad-bg); }
  .card h4 {
    margin: 0 0 12px 0;
    font-size: 28px;
    color: var(--fg);
    font-weight: 700;
  }
  .card.accent h4 { color: var(--accent); }
  .card.warn h4 { color: var(--warn); }
  .card.good h4 { color: var(--good); }
  .card.bad h4 { color: var(--bad); }
  .card p, .card li { font-size: 25px; line-height: 1.5; }
  .card ul { padding-left: 24px; }
  .card ul li { margin-bottom: 8px; }
  .center { text-align: center; }
  .vcenter { justify-content: center; }
  .stat { display: flex; flex-direction: column; align-items: center; padding: 18px; }
  .stat-val {
    font-size: 88px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    letter-spacing: -2px;
  }
  .stat-label { font-size: 24px; color: var(--fg-dim); margin-top: 12px; }
  .flow-node {
    background: var(--bg-2);
    border: 2px solid var(--line-2);
    border-radius: 14px;
    padding: 18px 22px;
    text-align: center;
    font-size: 26px;
    font-weight: 600;
  }
  .flow-node.accent { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); }
  .flow-node.accent2 { border-color: var(--accent-2); background: var(--accent-2-bg); color: var(--accent-2); }
  .flow-node.good { border-color: var(--good); background: var(--good-bg); color: var(--good); }
  .arrow { font-size: 36px; color: var(--fg-mute); text-align: center; padding: 0 6px; }
</style>
</head>
<body>

<!-- 슬라이드는 아래에 채워넣는다. data-slide는 2자리 zero-pad. -->

  <p class="lead dim">부제</p>
  <div class="footer"><span>작성자</span><span>1 / 3</span></div>

</body>
</html>
